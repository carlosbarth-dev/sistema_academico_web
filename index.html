<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Academico Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topo">
        <div>
            <h1>Sistema Academico Web</h1>
            <p>Controle academico de alunos, turmas e notas</p>
        </div>
        <button id="limparDados" class="botao-secundario" type="button">Limpar dados</button>
    </header>

    <main class="layout">
        <section class="painel resumo">
            <div>
                <span class="rotulo">Alunos</span>
                <strong id="totalAlunos">0</strong>
            </div>
            <div>
                <span class="rotulo">Turmas</span>
                <strong id="totalTurmas">0</strong>
            </div>
            <div>
                <span class="rotulo">Aprovados</span>
                <strong id="totalAprovados">0</strong>
            </div>
            <div>
                <span class="rotulo">Media geral</span>
                <strong id="mediaGeral">0.0</strong>
            </div>
        </section>

        <section class="grade">
            <form id="formAluno" class="painel">
                <h2>Cadastrar aluno</h2>
                <label>
                    Nome do aluno
                    <input id="nomeAluno" type="text" placeholder="Ex.: Carlos Souza" required>
                </label>
                <label>
                    Matricula
                    <input id="matriculaAluno" type="text" placeholder="Ex.: 2026001" required>
                </label>
                <label>
                    Turma
                    <select id="turmaAluno" required></select>
                </label>
                <button type="submit">Salvar aluno</button>
            </form>

            <form id="formTurma" class="painel">
                <h2>Cadastrar turma</h2>
                <label>
                    Nome da turma
                    <input id="nomeTurma" type="text" placeholder="Ex.: ADS 1" required>
                </label>
                <label>
                    Turno
                    <select id="turnoTurma" required>
                        <option value="Manha">Manha</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                    </select>
                </label>
                <button type="submit">Salvar turma</button>
            </form>

            <form id="formNota" class="painel">
                <h2>Lancar nota</h2>
                <label>
                    Aluno
                    <select id="alunoNota" required></select>
                </label>
                <label>
                    Disciplina
                    <input id="disciplinaNota" type="text" placeholder="Ex.: Programacao" required>
                </label>
                <div class="duas-colunas">
                    <label>
                        Nota 1
                        <input id="nota1" type="number" min="0" max="10" step="0.1" required>
                    </label>
                    <label>
                        Nota 2
                        <input id="nota2" type="number" min="0" max="10" step="0.1" required>
                    </label>
                </div>
                <button type="submit">Salvar nota</button>
            </form>
        </section>

        <section class="painel">
            <div class="cabecalho-lista">
                <h2>Alunos cadastrados</h2>
                <input id="buscaAluno" type="search" placeholder="Buscar aluno">
            </div>
            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Matricula</th>
                            <th>Turma</th>
                            <th>Media</th>
                            <th>Situacao</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="listaAlunos"></tbody>
                </table>
            </div>
        </section>

        <section class="painel">
            <h2>Boletim</h2>
            <div id="boletim" class="boletim vazio">Selecione um aluno na tabela para visualizar o boletim.</div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
